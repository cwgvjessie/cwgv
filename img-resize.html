<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta name="robots" content="noindex, nofollow">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>圖片縮放工具</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 24px;
      letter-spacing: -0.3px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.1);
      padding: 24px;
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Upload zone */
    .upload-zone {
      border: 2px dashed #d0d0d0;
      border-radius: 8px;
      padding: 32px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: #4f7cff;
      background: #f0f4ff;
    }
    .upload-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer;
    }
    .upload-icon { font-size: 2rem; margin-bottom: 8px; }
    .upload-hint { font-size: .85rem; color: #888; margin-top: 4px; }

    /* Preview */
    .preview-wrap {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .preview-wrap.visible { display: flex; }
    .preview-wrap img {
      max-width: 100%;
      max-height: 260px;
      border-radius: 6px;
      border: 1px solid #e8e8e8;
      object-fit: contain;
    }
    .img-info {
      font-size: .8rem;
      color: #666;
      text-align: center;
      line-height: 1.6;
    }
    .reupload-btn {
      font-size: .8rem;
      color: #4f7cff;
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
    }

    /* Dimensions */
    .section-title {
      font-size: .8rem;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 10px;
    }

    .dim-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    .dim-row .field { flex: 1; }

    .scale-row { margin-top: 10px; }
    .scale-row .field { max-width: 160px; }

    .field label {
      display: block;
      font-size: .8rem;
      color: #555;
      margin-bottom: 4px;
    }
    .field .input-wrap {
      display: flex;
      align-items: center;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      overflow: hidden;
      transition: border-color .2s;
    }
    .field .input-wrap:focus-within { border-color: #4f7cff; }
    .field .input-wrap.error { border-color: #e53e3e; }
    .field .input-wrap.readonly { background: #f5f5f5; }
    .field .input-wrap.readonly input { color: #888; cursor: not-allowed; }
    .field input {
      border: none;
      outline: none;
      padding: 8px 10px;
      font-size: .95rem;
      width: 100%;
      background: transparent;
    }
    .field .unit {
      padding: 0 10px;
      font-size: .8rem;
      color: #aaa;
      white-space: nowrap;
      border-left: 1px solid #e8e8e8;
      background: #fafafa;
    }
    .field .err-msg {
      font-size: .75rem;
      color: #e53e3e;
      margin-top: 3px;
      min-height: 16px;
    }

    .link-icon {
      color: #bbb;
      font-size: 1.2rem;
      padding-bottom: 20px;
      user-select: none;
    }

    /* Aspect ratio toggle */
    .aspect-toggle {
      background: none;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      padding: 5px 9px;
      cursor: pointer;
      font-size: .9rem;
      line-height: 1;
      transition: border-color .2s, background .2s, color .2s;
      margin-bottom: 20px;
      white-space: nowrap;
      color: #aaa;
    }
    .aspect-toggle:hover { border-color: #4f7cff; background: #f0f4ff; color: #4f7cff; }
    .aspect-toggle.locked { color: #4f7cff; border-color: #4f7cff; background: #f0f4ff; }

    /* AI note */
    .ai-note {
      font-size: .78rem;
      color: #7a5c00;
      padding: 7px 11px;
      background: #fffbeb;
      border: 1px solid #f0d080;
      border-radius: 6px;
      margin-top: 10px;
      display: none;
    }
    .ai-note.visible { display: block; }

    /* Progress bar */
    .progress-bar-wrap {
      height: 4px;
      background: #e8e8e8;
      border-radius: 2px;
      overflow: hidden;
      margin-top: 8px;
      display: none;
    }
    .progress-bar-wrap.visible { display: block; }
    .progress-bar { height: 100%; background: #4f7cff; width: 0%; transition: width .15s linear; }
    .progress-label {
      font-size: .75rem;
      color: #888;
      text-align: center;
      margin-top: 4px;
      min-height: 14px;
    }

    /* Output */
    .output-row {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      flex-wrap: wrap;
    }
    .output-row .field { flex: 1; min-width: 120px; }

    select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      font-size: .95rem;
      background: #fff;
      outline: none;
      cursor: pointer;
    }
    select:focus { border-color: #4f7cff; }

    .quality-wrap { display: flex; align-items: center; gap: 10px; }
    .quality-wrap input[type="range"] { flex: 1; accent-color: #4f7cff; }
    .quality-val {
      font-size: .85rem;
      font-weight: 600;
      color: #4f7cff;
      min-width: 28px;
      text-align: right;
    }
    .quality-field { display: none; }
    .quality-field.visible { display: block; }

    /* Button */
    .download-btn {
      width: 100%;
      padding: 12px;
      background: #4f7cff;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background .2s, opacity .2s;
    }
    .download-btn:hover { background: #3a64e8; }
    .download-btn:disabled { background: #c0c0c0; cursor: not-allowed; opacity: .7; }

    .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-toast {
      background: #fff2f2;
      border: 1px solid #fca5a5;
      color: #b91c1c;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: .85rem;
      display: none;
    }
    .error-toast.visible { display: block; }
  </style>
</head>
<body>

<h1>圖片縮放工具</h1>

<div class="card">

  <!-- Upload zone -->
  <div class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" accept=".jpg,.jpeg,.png,.webp,.gif,.bmp">
    <div class="upload-icon">🖼️</div>
    <div>點擊或拖曳上傳圖片</div>
    <div class="upload-hint">支援 JPG、PNG、WebP、GIF、BMP，最大 20MB</div>
  </div>

  <!-- Error toast -->
  <div class="error-toast" id="errorToast"></div>

  <!-- Preview -->
  <div class="preview-wrap" id="previewWrap">
    <img id="previewImg" src="" alt="預覽">
    <div class="img-info" id="imgInfo"></div>
    <button class="reupload-btn" id="reuploadBtn">更換圖片</button>
  </div>

  <!-- Original dimensions (manual input or auto-filled from upload) -->
  <div id="origSection">
    <div class="section-title">原始尺寸</div>
    <div class="dim-row">
      <div class="field">
        <label for="origW">原始寬度</label>
        <div class="input-wrap" id="wrapOrigW">
          <input type="number" id="origW" min="1" max="100000" placeholder="輸入寬度">
          <span class="unit">px</span>
        </div>
        <div class="err-msg" id="errOrigW"></div>
      </div>
      <div class="link-icon" style="padding-bottom:20px; color:#ddd;">×</div>
      <div class="field">
        <label for="origH">原始高度</label>
        <div class="input-wrap" id="wrapOrigH">
          <input type="number" id="origH" min="1" max="100000" placeholder="輸入高度">
          <span class="unit">px</span>
        </div>
        <div class="err-msg" id="errOrigH"></div>
      </div>
    </div>
  </div>

  <hr style="border:none; border-top:1px solid #f0f0f0;">

  <!-- Target dimensions -->
  <div id="dimSection">
    <div class="section-title">目標尺寸</div>
    <div class="dim-row">
      <div class="field">
        <label for="inputW">寬度</label>
        <div class="input-wrap" id="wrapW">
          <input type="number" id="inputW" min="1" max="100000" placeholder="—">
          <span class="unit">px</span>
        </div>
        <div class="err-msg" id="errW"></div>
      </div>
      <button class="aspect-toggle locked" id="aspectToggle" title="切換等比／非等比縮放">🔗</button>
      <div class="field">
        <label for="inputH">高度</label>
        <div class="input-wrap" id="wrapH">
          <input type="number" id="inputH" min="1" max="100000" placeholder="—">
          <span class="unit">px</span>
        </div>
        <div class="err-msg" id="errH"></div>
      </div>
    </div>
    <div class="scale-row" id="scaleRow">
      <div class="field">
        <label for="inputScale">縮放比例</label>
        <div class="input-wrap" id="wrapScale">
          <input type="number" id="inputScale" min="0.01" max="10000" step="0.1" placeholder="—">
          <span class="unit">%</span>
        </div>
        <div class="err-msg" id="errScale"></div>
      </div>
    </div>
    <div class="ai-note" id="aiNote">⚡ 非等比模式：使用內容感知智慧縮放，避免畫面變形，處理時間較長</div>
  </div>

  <!-- Output format & quality (only shown when image is loaded) -->
  <div id="outputSection" style="display:none;">
    <div class="section-title">輸出設定</div>
    <div class="output-row">
      <div class="field">
        <label for="selectFmt">格式</label>
        <select id="selectFmt">
          <option value="same">與原圖相同</option>
          <option value="image/jpeg">JPG</option>
          <option value="image/png">PNG</option>
          <option value="image/webp">WebP</option>
        </select>
      </div>
      <div class="field quality-field" id="qualityField">
        <label>品質 <span class="quality-val" id="qualityVal">90</span></label>
        <div class="quality-wrap">
          <input type="range" id="qualityRange" min="1" max="100" value="90">
        </div>
      </div>
    </div>
  </div>

  <!-- Download button -->
  <div>
    <button class="download-btn" id="downloadBtn" disabled>
      <span id="btnText">縮放並下載</span>
      <div class="spinner" id="spinner"></div>
    </button>
    <div class="progress-bar-wrap" id="progressBarWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="progress-label" id="progressLabel"></div>
  </div>

</div>

<canvas id="canvas" style="display:none"></canvas>

<script>
  // ── State ──
  let origMime = '', origFileName = '';
  let imageLoaded = false;
  let updating = false;
  let proportional = true;

  // ── Elements ──
  const fileInput      = document.getElementById('fileInput');
  const uploadZone     = document.getElementById('uploadZone');
  const previewWrap    = document.getElementById('previewWrap');
  const previewImg     = document.getElementById('previewImg');
  const imgInfo        = document.getElementById('imgInfo');
  const reuploadBtn    = document.getElementById('reuploadBtn');
  const errorToast     = document.getElementById('errorToast');
  const elOrigW        = document.getElementById('origW');
  const elOrigH        = document.getElementById('origH');
  const wrapOrigW      = document.getElementById('wrapOrigW');
  const wrapOrigH      = document.getElementById('wrapOrigH');
  const errOrigW       = document.getElementById('errOrigW');
  const errOrigH       = document.getElementById('errOrigH');
  const inputW         = document.getElementById('inputW');
  const inputH         = document.getElementById('inputH');
  const inputScale     = document.getElementById('inputScale');
  const wrapW          = document.getElementById('wrapW');
  const wrapH          = document.getElementById('wrapH');
  const wrapScale      = document.getElementById('wrapScale');
  const errW           = document.getElementById('errW');
  const errH           = document.getElementById('errH');
  const errScale       = document.getElementById('errScale');
  const outputSection  = document.getElementById('outputSection');
  const selectFmt      = document.getElementById('selectFmt');
  const qualityField   = document.getElementById('qualityField');
  const qualityRange   = document.getElementById('qualityRange');
  const qualityVal     = document.getElementById('qualityVal');
  const downloadBtn    = document.getElementById('downloadBtn');
  const btnText        = document.getElementById('btnText');
  const spinner        = document.getElementById('spinner');
  const canvas         = document.getElementById('canvas');
  const aspectToggle   = document.getElementById('aspectToggle');
  const aiNote         = document.getElementById('aiNote');
  const scaleRowEl     = document.getElementById('scaleRow');
  const progressBarWrap = document.getElementById('progressBarWrap');
  const progressBar    = document.getElementById('progressBar');
  const progressLabel  = document.getElementById('progressLabel');

  // ── Getters ──
  function getOrigW() { return parseFloat(elOrigW.value); }
  function getOrigH() { return parseFloat(elOrigH.value); }
  function hasValidOrig() { return isValidPx(getOrigW()) && isValidPx(getOrigH()); }

  // ── Aspect ratio toggle ──
  aspectToggle.addEventListener('click', () => {
    proportional = !proportional;
    aspectToggle.classList.toggle('locked', proportional);
    aspectToggle.textContent = proportional ? '🔗' : '🔓';
    aiNote.classList.toggle('visible', !proportional);
    scaleRowEl.style.display = proportional ? '' : 'none';
    if (proportional && hasValidOrig()) {
      const w = parseFloat(inputW.value);
      if (isValidPx(w)) syncFrom('w');
    }
    updateDownloadBtn();
  });

  // ── Upload ──
  function handleFile(file) {
    showError('');
    if (!file) return;

    const allowed = ['image/jpeg', 'image/png', 'image/webp', 'image/gif', 'image/bmp'];
    if (!allowed.includes(file.type)) {
      showError('不支援此格式，請上傳 JPG / PNG / WebP / GIF / BMP');
      return;
    }
    if (file.size > 20 * 1024 * 1024) {
      showError('檔案大小超過 20MB，請選擇較小的檔案');
      return;
    }

    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        origMime = file.type;
        origFileName = file.name.replace(/\.[^.]+$/, '');
        imageLoaded = true;

        // Auto-fill original dims and lock them
        elOrigW.value = img.naturalWidth;
        elOrigH.value = img.naturalHeight;
        elOrigW.readOnly = true;
        elOrigH.readOnly = true;
        wrapOrigW.classList.add('readonly');
        wrapOrigH.classList.add('readonly');
        clearError(wrapOrigW, errOrigW);
        clearError(wrapOrigH, errOrigH);

        previewImg.src = e.target.result;
        imgInfo.textContent =
          `${img.naturalWidth} × ${img.naturalHeight} px　` +
          `${file.type.split('/')[1].toUpperCase()}　${formatBytes(file.size)}`;
        uploadZone.style.display = 'none';
        previewWrap.classList.add('visible');
        outputSection.style.display = '';

        // Reset target to 100%
        inputW.value = img.naturalWidth;
        inputH.value = img.naturalHeight;
        inputScale.value = 100;
        clearTargetErrors();
        updateDownloadBtn();
        updateQualityVisibility();
      };
      img.onerror = () => showError('圖片讀取失敗，請重新嘗試');
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  fileInput.addEventListener('change', e => handleFile(e.target.files[0]));
  uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('drag-over');
    handleFile(e.dataTransfer.files[0]);
  });

  reuploadBtn.addEventListener('click', () => {
    uploadZone.style.display = '';
    previewWrap.classList.remove('visible');
    outputSection.style.display = 'none';
    fileInput.value = '';
    imageLoaded = false;
    origMime = '';
    elOrigW.value = '';
    elOrigH.value = '';
    elOrigW.readOnly = false;
    elOrigH.readOnly = false;
    wrapOrigW.classList.remove('readonly');
    wrapOrigH.classList.remove('readonly');
    inputW.value = inputH.value = inputScale.value = '';
    clearError(wrapOrigW, errOrigW);
    clearError(wrapOrigH, errOrigH);
    clearTargetErrors();
  });

  // ── Target dimension linkage ──
  function syncFrom(source) {
    if (updating || !hasValidOrig()) return;
    if (!proportional) { updateDownloadBtn(); return; }
    updating = true;
    clearTargetErrors();

    const ow = getOrigW(), oh = getOrigH();

    if (source === 'w') {
      const w = parseFloat(inputW.value);
      if (isValidPx(w)) {
        inputH.value = Math.max(1, Math.round(oh * (w / ow)));
        inputScale.value = round1(w / ow * 100);
      } else {
        setError(wrapW, errW, '請輸入正整數');
      }
    } else if (source === 'h') {
      const h = parseFloat(inputH.value);
      if (isValidPx(h)) {
        inputW.value = Math.max(1, Math.round(ow * (h / oh)));
        inputScale.value = round1(h / oh * 100);
      } else {
        setError(wrapH, errH, '請輸入正整數');
      }
    } else if (source === 'scale') {
      const s = parseFloat(inputScale.value);
      if (isValidScale(s)) {
        inputW.value = Math.max(1, Math.round(ow * s / 100));
        inputH.value = Math.max(1, Math.round(oh * s / 100));
      } else {
        setError(wrapScale, errScale, '請輸入大於 0 的數值');
      }
    }

    updateDownloadBtn();
    updating = false;
  }

  inputW.addEventListener('input', () => syncFrom('w'));
  inputH.addEventListener('input', () => syncFrom('h'));
  inputScale.addEventListener('input', () => syncFrom('scale'));

  // ── Output format / quality ──
  function updateQualityVisibility() {
    const mime = selectFmt.value === 'same' ? origMime : selectFmt.value;
    qualityField.classList.toggle('visible', mime === 'image/jpeg' || mime === 'image/webp');
  }

  selectFmt.addEventListener('change', updateQualityVisibility);
  qualityRange.addEventListener('input', () => { qualityVal.textContent = qualityRange.value; });

  function getOutputMime() {
    return selectFmt.value === 'same' ? origMime : selectFmt.value;
  }

  // ── Download ──
  downloadBtn.addEventListener('click', async () => {
    if (!imageLoaded) return;
    const w = parseInt(inputW.value);
    const h = parseInt(inputH.value);
    if (!isValidPx(w) || !isValidPx(h)) return;

    setLoading(true);
    showProgress(true, 0);

    try {
      if (proportional) {
        await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, w, h);
        ctx.drawImage(previewImg, 0, 0, w, h);
        showProgress(false);
      } else {
        const result = await contentAwareResize(previewImg, w, h, p => showProgress(true, p));
        canvas.width = w;
        canvas.height = h;
        canvas.getContext('2d').drawImage(result, 0, 0, w, h);
        showProgress(false);
      }

      const mime = getOutputMime();
      const quality = (mime === 'image/jpeg' || mime === 'image/webp')
        ? parseFloat(qualityRange.value) / 100 : undefined;
      const ext = mime.split('/')[1].replace('jpeg', 'jpg');

      canvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${origFileName}_${w}x${h}.${ext}`;
        a.click();
        URL.revokeObjectURL(url);
        setLoading(false);
      }, mime, quality);
    } catch {
      showError('縮放處理失敗，請重新嘗試');
      showProgress(false);
      setLoading(false);
    }
  });

  // ── Seam Carving（內容感知智慧縮放）────────────────────────────────────────
  const SC_MAX_DIM = 700; // 最大工作尺寸，控制效能

  function scYield() { return new Promise(r => setTimeout(r, 0)); }

  // 計算每個像素的能量（雙梯度）
  function scEnergy(px, w, h) {
    const e = new Float32Array(w * h);
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const xL = x > 0 ? x - 1 : 1,     xR = x < w - 1 ? x + 1 : x - 1;
        const yU = y > 0 ? y - 1 : 1,     yD = y < h - 1 ? y + 1 : y - 1;
        const iL = (y * w + xL) * 4, iR = (y * w + xR) * 4;
        const iU = (yU * w + x) * 4, iD = (yD * w + x) * 4;
        const rx = px[iR]-px[iL], gx = px[iR+1]-px[iL+1], bx = px[iR+2]-px[iL+2];
        const ry = px[iD]-px[iU], gy = px[iD+1]-px[iU+1], by = px[iD+2]-px[iU+2];
        e[y * w + x] = rx*rx + gx*gx + bx*bx + ry*ry + gy*gy + by*by;
      }
    }
    return e;
  }

  // 動態規劃找最低能量垂直接縫
  function scFindSeam(e, w, h) {
    const dp   = new Float32Array(w * h);
    const from = new Int8Array(w * h); // dx: -1, 0, 1
    for (let x = 0; x < w; x++) dp[x] = e[x];
    for (let y = 1; y < h; y++) {
      for (let x = 0; x < w; x++) {
        let best = dp[(y-1)*w+x], dx = 0;
        if (x > 0   && dp[(y-1)*w+x-1] < best) { best = dp[(y-1)*w+x-1]; dx = -1; }
        if (x < w-1 && dp[(y-1)*w+x+1] < best) { best = dp[(y-1)*w+x+1]; dx =  1; }
        dp[y*w+x] = e[y*w+x] + best;
        from[y*w+x] = dx;
      }
    }
    let minX = 0;
    for (let x = 1; x < w; x++) if (dp[(h-1)*w+x] < dp[(h-1)*w+minX]) minX = x;
    const seam = new Int32Array(h);
    seam[h-1] = minX;
    for (let y = h-2; y >= 0; y--) seam[y] = seam[y+1] + from[(y+1)*w+seam[y+1]];
    return seam;
  }

  // 移除一條垂直接縫
  function scRemove(px, w, h, seam) {
    const nw = w - 1;
    const out = new Uint8ClampedArray(nw * h * 4);
    for (let y = 0; y < h; y++) {
      const sx = seam[y], s = y * w * 4, d = y * nw * 4;
      out.set(px.subarray(s, s + sx * 4), d);
      out.set(px.subarray(s + (sx+1)*4, s + w*4), d + sx*4);
    }
    return out;
  }

  // 插入 k 條垂直接縫（放大用）
  function scInsert(px, w, h, k) {
    const e = scEnergy(px, w, h);
    const seams = [];
    for (let i = 0; i < k; i++) {
      const seam = scFindSeam(e, w, h);
      seams.push(seam);
      // 標記已選接縫，避免重複選擇
      for (let y = 0; y < h; y++) e[y * w + seam[y]] = 1e15;
    }
    // 對每行收集接縫 x 座標並排序後插入
    const nw = w + k;
    const out = new Uint8ClampedArray(nw * h * 4);
    const rowSeams = Array.from({length: h}, () => []);
    for (let i = 0; i < k; i++) for (let y = 0; y < h; y++) rowSeams[y].push(seams[i][y]);
    for (let y = 0; y < h; y++) {
      const xs = rowSeams[y].sort((a, b) => a - b);
      let si = 0, dstX = 0;
      for (let x = 0; x < w; x++) {
        const so = (y * w + x) * 4, dst = (y * nw + dstX) * 4;
        out[dst] = px[so]; out[dst+1] = px[so+1]; out[dst+2] = px[so+2]; out[dst+3] = px[so+3];
        dstX++;
        while (si < xs.length && xs[si] === x) {
          const nx = Math.min(x + 1, w - 1);
          const no = (y * w + nx) * 4, io = (y * nw + dstX) * 4;
          out[io]   = (px[so] + px[no]) >> 1;
          out[io+1] = (px[so+1] + px[no+1]) >> 1;
          out[io+2] = (px[so+2] + px[no+2]) >> 1;
          out[io+3] = (px[so+3] + px[no+3]) >> 1;
          dstX++; si++;
        }
      }
    }
    return out;
  }

  // 轉置像素陣列（寬高對調，用於處理水平接縫）
  function scTranspose(px, w, h) {
    const out = new Uint8ClampedArray(w * h * 4);
    for (let y = 0; y < h; y++)
      for (let x = 0; x < w; x++) {
        const s = (y * w + x) * 4, d = (x * h + y) * 4;
        out[d] = px[s]; out[d+1] = px[s+1]; out[d+2] = px[s+2]; out[d+3] = px[s+3];
      }
    return out; // 新尺寸: 寬=h, 高=w
  }

  // 主流程：內容感知縮放
  async function contentAwareResize(srcImg, targetW, targetH, onProgress) {
    const srcW = srcImg.naturalWidth, srcH = srcImg.naturalHeight;

    // 限制工作尺寸以控制效能，最終結果再等比放回目標尺寸
    const scale = Math.min(1.0, SC_MAX_DIM / Math.max(srcW, srcH));
    const workW = Math.round(srcW * scale), workH = Math.round(srcH * scale);
    const wtW   = Math.max(1, Math.round(targetW * scale));
    const wtH   = Math.max(1, Math.round(targetH * scale));

    // 以工作尺寸繪製來源圖
    const wc = document.createElement('canvas');
    wc.width = workW; wc.height = workH;
    wc.getContext('2d').drawImage(srcImg, 0, 0, workW, workH);
    let px = wc.getContext('2d').getImageData(0, 0, workW, workH).data;
    let cW = workW, cH = workH;

    const total = Math.max(1, Math.abs(wtW - workW) + Math.abs(wtH - workH));
    let done = 0;

    // ── 調整寬度（垂直接縫） ──
    if (wtW < cW) {
      const cnt = cW - wtW;
      for (let i = 0; i < cnt; i++) {
        const e = scEnergy(px, cW, cH);
        px = scRemove(px, cW, cH, scFindSeam(e, cW, cH));
        cW--; done++;
        if (i % 8 === 0) { onProgress(done / total); await scYield(); }
      }
    } else if (wtW > cW) {
      px = scInsert(px, cW, cH, wtW - cW);
      done += wtW - cW; cW = wtW;
      onProgress(done / total); await scYield();
    }

    // ── 調整高度（轉置後處理垂直接縫，再轉置回來） ──
    if (wtH !== cH) {
      px = scTranspose(px, cW, cH);
      let tW = cH, tH = cW; // 轉置後: 新寬=原高, 新高=原寬

      if (wtH < tW) {
        const cnt = tW - wtH;
        for (let i = 0; i < cnt; i++) {
          const e = scEnergy(px, tW, tH);
          px = scRemove(px, tW, tH, scFindSeam(e, tW, tH));
          tW--; done++;
          if (i % 8 === 0) { onProgress(done / total); await scYield(); }
        }
      } else {
        px = scInsert(px, tW, tH, wtH - tW);
        done += wtH - tW; tW = wtH;
        onProgress(done / total); await scYield();
      }

      px = scTranspose(px, tW, tH);
      cW = tH; cH = tW;
    }

    onProgress(1);

    // 將工作結果放大至目標尺寸（等比放大，無額外失真）
    const tmp = document.createElement('canvas');
    tmp.width = cW; tmp.height = cH;
    tmp.getContext('2d').putImageData(new ImageData(new Uint8ClampedArray(px.buffer), cW, cH), 0, 0);

    const out = document.createElement('canvas');
    out.width = targetW; out.height = targetH;
    out.getContext('2d').drawImage(tmp, 0, 0, targetW, targetH);
    return out;
  }
  // ─────────────────────────────────────────────────────────────────────────

  // ── Helpers ──
  function isValidPx(v)    { return Number.isFinite(v) && v >= 1; }
  function isValidScale(v) { return Number.isFinite(v) && v > 0; }
  function round1(v)       { return Math.round(v * 10) / 10; }
  function formatBytes(b)  {
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
    return (b / 1048576).toFixed(1) + ' MB';
  }
  function showError(msg) {
    errorToast.textContent = msg;
    errorToast.classList.toggle('visible', !!msg);
  }
  function setError(wrap, errEl, msg) { wrap.classList.add('error'); errEl.textContent = msg; }
  function clearError(wrap, errEl)    { wrap.classList.remove('error'); errEl.textContent = ''; }
  function clearTargetErrors() {
    clearError(wrapW, errW); clearError(wrapH, errH); clearError(wrapScale, errScale);
  }
  function updateDownloadBtn() {
    const w = parseFloat(inputW.value), h = parseFloat(inputH.value);
    downloadBtn.disabled = !(imageLoaded && isValidPx(w) && isValidPx(h));
  }
  function setLoading(on) {
    downloadBtn.disabled = on;
    btnText.style.display = on ? 'none' : '';
    spinner.style.display = on ? 'block' : 'none';
  }
  function showProgress(visible, pct = 0) {
    progressBarWrap.classList.toggle('visible', visible);
    progressBar.style.width = (pct * 100).toFixed(1) + '%';
    progressLabel.textContent = visible ? `智慧縮放中… ${Math.round(pct * 100)}%` : '';
  }
</script>
